# fly.toml app configuration file generated for entia-cms on 2026-06-19T20:52:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'entia-cms'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_FALLBACK_LOCALE = 'es'
  APP_LOCALE = 'es'
  CACHE_STORE = 'database'
  CONTACT_MAILER = 'resend'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/data/database/database.sqlite'
  FILESYSTEM_DISK = 'public'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  QUEUE_CONNECTION = 'database'
  SESSION_DRIVER = 'database'

[[mounts]]
  source = 'entia_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '30s'
    method = 'GET'
    path = '/up'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
